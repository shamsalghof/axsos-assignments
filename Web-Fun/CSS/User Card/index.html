<!DOCTYPE html>
<html lang="en">
<head>

<title>Profile Card</title>

</head>
<body>

<div class="card">

    <div class="header"></div>

    <img class="profile-img" src="static/icons/user-circle.png" alt="profile">

</div>

</html>
