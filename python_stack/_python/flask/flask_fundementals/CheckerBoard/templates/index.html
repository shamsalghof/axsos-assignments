<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CheckerBoard</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='style.css')}}" />

  </head>
  <body>
    <div class="container">
      <h1>checkerBoard {{ x }} x {{ y }}</h1>
      {% for i in range(x): %}
      <div class="row">
        {% for j in range(y): %} {% if (i + j) % 2 == 0: %}
        <div class="box" style="background-color: {{ color1 }} ;"></div>
        {% else: %}
        <div class="box" style="background-color: {{ color2 }} ;"></div>
        {% endif %} {% endfor %}
      </div>
      {% endfor%}
    </div>
  </body>
</html>
