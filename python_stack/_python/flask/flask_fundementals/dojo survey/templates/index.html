<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dojo Survey</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-secondary d-flex justify-content-center align-items-center vh-100">

<div class="card p-4" style="width: 500px;">
    <h5 class="mb-4 text-center">Dojo Survey</h5>

    <form action="/result" method="post">

        <!-- Name -->
        <div class="form-group row">
            <label class="col-sm-4 col-form-label">Your Name:</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" name="name">
            </div>
        </div>

        <!-- Location -->
        <div class="form-group row">
            <label class="col-sm-4 col-form-label">Dojo Location:</label>
            <div class="col-sm-8">
                <select class="form-control" name="location">
                    <option>San Jose</option>
                    <option>Seattle</option>
                    <option>Dallas</option>
                </select>
            </div>
        </div>

        <!-- Language -->
        <div class="form-group row">
            <label class="col-sm-4 col-form-label">Favorite Language:</label>
            <div class="col-sm-8">
                <select class="form-control" name="language">
                    <option>Python</option>
                    <option>JavaScript</option>
                    <option>Java</option>
                </select>
            </div>
        </div>

        <!-- Comment -->
        <div class="form-group row">
            <label class="col-sm-4 col-form-label">Comment:</label>
            <div class="col-sm-8">
                <textarea class="form-control" name="comment" rows="3"></textarea>
            </div>
        </div>
        <div class="form-group row">
            <label class="col-sm-4 col-form-label">Gender:</label>
            <div class="form-check">
                <input class="form-check-input" type="radio" value="male" name="gender" id="maleId">
                <label class="form-check-label" for="maleId">
                    Male
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input" value="female" type="radio" name="gender" id="femaleId">
                <label class="form-check-label" for="femaleId">
                    Female
                </label>
            </div>
        </div>
        <div class="form-group row">
            <label class="col-sm-4 col-form-label">Favourite Sports:</label>
            <div class="form-check">
                <input class="form-check-input" name="fav_sport" type="checkbox" value="Football" id="football">
                <label class="form-check-label" for="football">
                    Football
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" name="fav_sport" type="checkbox" value="Swimming" id="swimming">
                <label class="form-check-label" for="swimming">
                    Swimming
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" name="fav_sport" type="checkbox" value="Running" id="running">
                <label class="form-check-label" for="running">
                    Running
                </label>
            </div>
        </div>
        <!-- Button -->
        <div class="text-right">
            <button type="submit" class="btn btn-info">Submit</button>
        </div>

    </form>
</div>

</body>
</html>
