<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dojo Survey</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f5f5f5;
        }

        .survey-box{
            width:550px;
            margin:40px auto;
            border:2px solid black;
            padding:30px;
            background:white;
        }

        textarea{
            resize:none;
        }
    </style>
</head>
<body>

<div class="survey-box">

    <form action="/result" method="POST">
        {% csrf_token %}

        <!-- Name -->
        <div class="row mb-3 align-items-center">
            <label class="col-sm-4 col-form-label fw-bold">
                Your Name:
            </label>

            <div class="col-sm-8">
                <input type="text"
                       name="name"
                       class="form-control"
                       required>
            </div>
        </div>

        <!-- Dojo Location -->
        <div class="row mb-3 align-items-center">
            <label class="col-sm-4 col-form-label fw-bold">
                Dojo Location:
            </label>

            <div class="col-sm-8">
                <select name="dojo_location"
                        class="form-select"
                        required>

                    <option value="San Jose">San Jose</option>
                    <option value="Seattle">Seattle</option>
                    <option value="Dallas">Dallas</option>
                    <option value="Chicago">Chicago</option>
                    <option value="Los Angeles">Los Angeles</option>
                    <option value="Washington DC">Washington DC</option>
                    <option value="Online">Online</option>

                </select>
            </div>
        </div>

        <!-- Favorite Language -->
        <div class="row mb-3 align-items-center">
            <label class="col-sm-4 col-form-label fw-bold">
                Favorite Language:
            </label>

            <div class="col-sm-8">
                <select name="favorite_language"
                        class="form-select"
                        required>

                    <option value="Python">Python</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Java">Java</option>
                    <option value="C#">C#</option>
                    <option value="Ruby">Ruby</option>
                    <option value="Go">Go</option>
                    <option value="Rust">Rust</option>

                </select>
            </div>
        </div>

        <!-- Experience -->
        <div class="mb-4">
            <label class="fw-bold d-block mb-2">
                Experience Level:
            </label>

            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       name="experience"
                       value="Beginner"
                       id="beginner">

                <label class="form-check-label" for="beginner">
                    Beginner
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       name="experience"
                       value="Intermediate"
                       id="intermediate">

                <label class="form-check-label" for="intermediate">
                    Intermediate
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       name="experience"
                       value="Advanced"
                       id="advanced">

                <label class="form-check-label" for="advanced">
                    Advanced
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       name="experience"
                       value="Ninja"
                       id="ninja">

                <label class="form-check-label" for="ninja">
                    Ninja 🥷
                </label>
            </div>
        </div>

        <!-- Interests -->
        <div class="mb-4">
            <label class="fw-bold d-block mb-2">
                Interests:
            </label>

            <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       name="interests"
                       value="Web Development"
                       id="web">

                <label class="form-check-label" for="web">
                    Web Development
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       name="interests"
                       value="Machine Learning"
                       id="ml">

                <label class="form-check-label" for="ml">
                    Machine Learning
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       name="interests"
                       value="Mobile Apps"
                       id="mobile">

                <label class="form-check-label" for="mobile">
                    Mobile Apps
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       name="interests"
                       value="Data Science"
                       id="data">

                <label class="form-check-label" for="data">
                    Data Science
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       name="interests"
                       value="DevOps"
                       id="devops">

                <label class="form-check-label" for="devops">
                    DevOps
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       name="interests"
                       value="Cybersecurity"
                       id="cyber">

                <label class="form-check-label" for="cyber">
                    Cybersecurity
                </label>
            </div>
        </div>

        <!-- Comment -->
        <div class="mb-4">
            <label class="form-label fw-bold">
                Comment (optional):
            </label>

            <textarea name="comment"
                      rows="5"
                      class="form-control"></textarea>
        </div>

        <!-- Submit -->
        <div class="text-end">
            <button type="submit"
                    class="btn btn-info border border-dark">
                Button
            </button>
        </div>

    </form>

</div>

</body>
</html>
